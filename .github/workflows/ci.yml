name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ────────────────────────────────────────────────────────
  # Job 1: Lint — ruff + black
  # ────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: Run ruff
        run: ruff check app/ tests/

      - name: Run black (check only)
        run: black --check app/ tests/

  # ────────────────────────────────────────────────────────
  # Job 2: Test — pytest with mocked secrets
  # ────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint   # only run if lint passes

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      AGENT_SECRET_KEY: ${{ secrets.AGENT_SECRET_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      CHROMA_DB_DIR: ./chroma_data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download SpaCy model (needed for Presidio PII detector)
        run: python -m spacy download en_core_web_lg

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────
  # Job 3: Docker Build (build-only, no push — CD ready)
  # ────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test   # only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rag-doc-assistant:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
